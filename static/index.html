<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to SQL Demo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Highlight.js for code formatting -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>

<body>
    <div class="background-overlay"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <header>
            <div class="logo-area">
                <h1>Text2SQL</h1>
            </div>
            <p class="subtitle">Generate precise SQL queries from natural language</p>
        </header>

        <section class="query-section">
            <form id="queryForm">
                <div class="input-wrapper">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <input type="text" id="queryInput" placeholder="e.g. Find the number of orders for each customer..."
                        required autocomplete="off" />
                    <button type="submit" id="submitBtn">
                        <span>Generate</span>
                        <div class="spinner hide" id="loadingSpinner"></div>
                    </button>
                </div>
            </form>
        </section>

        <section class="results-section hide" id="resultsSection">
            <div class="result-card">
                <div class="card-header">
                    <h3>Agent Thinking Logs</h3>
                    <button class="toggle-btn" id="toggleContextBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="card-body collapsible hide" id="contextBody">
                    <pre><code class="language-sql" id="contextCode"></code></pre>
                </div>
            </div>

            <div class="result-card primary-card">
                <div class="card-header">
                    <div class="title-with-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                        <h3>Generated SQL</h3>
                    </div>
                    <button class="copy-btn" id="copyTextBtn" title="Copy to clipboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                </div>
                <div class="card-body">
                    <pre><code class="language-sql" id="sqlCode"></code></pre>
                </div>
            </div>
        </section>

        <div class="error-toast hide" id="errorToast">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="errorMsg"></span>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
